<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                <h1>Vocify AI</h1>
            </div>
            <button id="theme-toggle" class="btn-icon" aria-label="Toggle theme">🌓</button>
        </header>
        
        <main class="main-content">
            <div class="controls-panel">
                <div class="control-group">
                    <label for="voice-select">Voice</label>
                    <select id="voice-select">
                        <option value="female">Eleanor (Female)</option>
                        <option value="male">Marcus (Male)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="emotion-select">Emotion</label>
                    <select id="emotion-select">
                        <option value="Normal">Normal</option>
                        <option value="Happy">Happy</option>
                        <option value="Sad">Sad</option>
                        <option value="Angry">Angry</option>
                        <option value="Excited">Excited</option>
                        <option value="Calm">Calm</option>
                        <option value="Fearful">Fearful</option>
                        <option value="Surprised">Surprised</option>
                        <option value="Serious">Serious</option>
                        <option value="Gentle">Gentle</option>
                        <option value="Disgusted">Disgusted</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="speed-slider">Speed (<span id="speed-value">1.2</span>x)</label>
                    <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.2">
                </div>
            </div>

            <div class="text-panel">
                <div class="text-header">
                    <label for="text-input">Text to Speech</label>
                    <span class="char-count"><span id="char-current">0</span> / 5000</span>
                </div>
                <textarea id="text-input" placeholder="Enter text here... Use punctuation like commas or periods for natural pauses. Example: Hello, my name is Eleanor. How are you doing today?" rows="8"></textarea>
                
                <div class="action-panel">
                    <button id="copy-btn" class="btn-secondary">Copy Text</button>
                    <div class="spacer"></div>
                    <button id="clear-btn" class="btn-secondary">Clear</button>
                    <button id="generate-btn" class="btn-primary">Generate Speech</button>
                </div>
            </div>

            <!-- Preview panel shown after generation starts -->
            <div class="preview-panel" id="preview-panel" style="display: none;">
                <div class="loading-state" id="loading-state">
                    <div class="spinner"></div>
                    <span>Synthesizing voice...</span>
                </div>
                
                <div class="audio-state" id="audio-state" style="display: none;">
                    <audio id="audio-player" controls></audio>
                    <div class="audio-actions">
                        <button id="download-btn" class="btn-secondary">Download WAV / MP3</button>
                    </div>
                </div>
            </div>

            <div class="history-panel">
                <h3>Generation History</h3>
                <ul id="history-list">
                    <!-- History items will be inserted here by JS -->
                </ul>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
